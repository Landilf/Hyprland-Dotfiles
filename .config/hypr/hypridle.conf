general {
 before_sleep_cmd = hyprctl dispatch dpms off
 after_sleep_cmd = ~/.config/hypr/scripts/lock_then_dpms_on.sh
}

listener {
 timeout = 300
 on-timeout = ~/.config/hypr/scripts/brightness_idle.sh dim
 on-resume = ~/.config/hypr/scripts/brightness_idle.sh restore
}

listener {
 timeout = 900
 on-timeout = hyprctl dispatch dpms off
 on-resume = ~/.config/hypr/scripts/lock_then_dpms_on.sh
}

listener {
 timeout = 840
 on-timeout = notify-send "Inactivity detected" "Screen will turn off in 60 seconds!"
 on-resume = notify-send "Activity detected" "Screen off is prevented or lifted!"
}

listener {
 timeout = 3600
 on-timeout = hyprctl dispatch dpms off; ~/.config/hypr/scripts/auto_sleeping_mode.sh
 on-resume = ~/.config/hypr/scripts/lock_then_dpms_on.sh
}
